# Spooler + Spoolman – run both services with a single command:
#   docker compose up -d
#
# network_mode: host is required on Linux so Spooler can:
#   - send UDP broadcast on port 3000 (printer discovery)
#   - open WebSocket to printers on port 3030

services:

  spoolman:
    image: ghcr.io/donkie/spoolman:latest
    network_mode: host
    environment:
      SPOOLMAN_PORT: "7912"
    volumes:
      - spoolman_data:/home/app/.local/share/spoolman
    restart: unless-stopped

  spooler:
    build: .
    network_mode: host
    env_file:
      - path: .env
        required: false   # OK to omit on first run; set AUTH_ENABLED=false if no .env
    environment:
      DATA_DIR: /data
    volumes:
      - spooler_data:/data
    depends_on:
      - spoolman
    restart: unless-stopped

volumes:
  spoolman_data:
  spooler_data:
