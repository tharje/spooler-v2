<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spooler – Sign in</title>
  <meta name="theme-color" content="#0d0e12" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0d0e12;
      color: #e2e4ea;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #181921;
      border: 1px solid #2a2b38;
      border-radius: 12px;
      padding: 40px 36px;
      width: 100%;
      max-width: 360px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #fff;
    }
    .logo img { width: 32px; height: 32px; border-radius: 7px; }
    h1 { font-size: 1rem; font-weight: 500; color: #9aa0b8; margin-bottom: 4px; }
    .subtitle { font-size: 0.82rem; color: #5a5f78; margin-bottom: 24px; }
    label { display: block; margin-bottom: 14px; }
    label span { display: block; font-size: 0.8rem; color: #9aa0b8; margin-bottom: 6px; }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      background: #0d0e12;
      border: 1px solid #2a2b38;
      border-radius: 8px;
      color: #e2e4ea;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #ff6b2b; }
    button[type="submit"] {
      width: 100%;
      padding: 11px;
      margin-top: 8px;
      background: #ff6b2b;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button[type="submit"]:hover { background: #e85a1e; }
    button[type="submit"]:disabled { background: #5a3020; cursor: default; }
    .error {
      display: none;
      margin-top: 14px;
      padding: 10px 12px;
      background: #3a1c1c;
      border: 1px solid #7a2020;
      border-radius: 8px;
      font-size: 0.85rem;
      color: #f87171;
    }
    .hint { font-size: 0.78rem; color: #5a5f78; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="/icon.svg" alt="Spooler" />
      Spooler
    </div>

    <!-- Filled in by JS based on /api/auth-status -->
    <h1 id="heading"></h1>
    <p class="subtitle" id="subtitle"></p>

    <form id="form">
      <label><span>Username</span>
        <input id="username" type="text" autocomplete="username" required />
      </label>
      <label><span>Password</span>
        <input id="password" type="password" autocomplete="current-password" required />
      </label>
      <label id="confirm-row" style="display:none"><span>Confirm password</span>
        <input id="confirm" type="password" autocomplete="new-password" />
        <p class="hint">Minimum 8 characters.</p>
      </label>
      <button type="submit" id="btn">Sign in</button>
    </form>
    <div class="error" id="error"></div>
  </div>

  <script>
    let setupMode = false;

    async function init() {
      try {
        const r = await fetch("/api/auth-status");
        const { setup_required } = await r.json();
        setupMode = !!setup_required;
      } catch {
        setupMode = false;
      }
      if (setupMode) {
        document.getElementById("heading").textContent = "Welcome to Spooler";
        document.getElementById("subtitle").textContent = "Create an account to get started.";
        document.getElementById("confirm-row").style.display = "block";
        document.getElementById("password").setAttribute("autocomplete", "new-password");
        document.getElementById("btn").textContent = "Create account";
      } else {
        document.getElementById("heading").textContent = "Sign in to continue";
        document.getElementById("subtitle").textContent = "";
        document.getElementById("btn").textContent = "Sign in";
      }
      document.getElementById("username").focus();
    }

    document.getElementById("form").addEventListener("submit", async e => {
      e.preventDefault();
      const btn   = document.getElementById("btn");
      const err   = document.getElementById("error");
      const user  = document.getElementById("username").value;
      const pass  = document.getElementById("password").value;
      const conf  = document.getElementById("confirm").value;

      err.style.display = "none";

      if (setupMode) {
        if (pass !== conf) {
          err.textContent = "Passwords do not match.";
          err.style.display = "block";
          return;
        }
        if (pass.length < 8) {
          err.textContent = "Password must be at least 8 characters.";
          err.style.display = "block";
          return;
        }
      }

      btn.disabled = true;
      btn.textContent = setupMode ? "Creating account…" : "Signing in…";

      const endpoint = setupMode ? "/api/setup" : "/api/login";
      try {
        const resp = await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: user, password: pass }),
        });
        if (resp.ok) {
          location.replace("/");
        } else {
          const data = await resp.json().catch(() => ({}));
          err.textContent = data.error || "Something went wrong.";
          err.style.display = "block";
          btn.disabled = false;
          btn.textContent = setupMode ? "Create account" : "Sign in";
        }
      } catch {
        err.textContent = "Network error – is Spooler running?";
        err.style.display = "block";
        btn.disabled = false;
        btn.textContent = setupMode ? "Create account" : "Sign in";
      }
    });

    init();
  </script>
</body>
</html>
