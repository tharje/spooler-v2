# Spooler + Spoolman  (dev — builds from local source)
#
# Usage:
#   docker compose -f docker-compose.dev.yml up --build
#
# network_mode: host is required on Linux so Spooler can:
#   - send UDP broadcast on port 3000 (printer discovery)
#   - reach printers via WebSocket on port 3030 / MQTT on port 1883

services:

  spoolman:
    image: ghcr.io/donkie/spoolman:latest
    network_mode: host
    environment:
      SPOOLMAN_PORT: "7912"
    volumes:
      - spoolman_data:/home/app/.local/share/spoolman
    restart: unless-stopped

  spooler:
    build: .
    network_mode: host
    env_file:
      - path: .env
        required: false
    environment:
      DATA_DIR: /data
    volumes:
      - spooler_data:/data
    depends_on:
      - spoolman
    restart: unless-stopped

volumes:
  spoolman_data:
  spooler_data:
